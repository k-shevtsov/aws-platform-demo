version: 3
automerge: false
delete_source_branch_on_merge: false
projects:
  - name: aws-platform-demo
    dir: terraform
    workspace: default
    terraform_version: v1.10.0
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../*.tf"
        - "modules/**/*.tf"
      enabled: true
    apply_requirements:
      - approved
