name: Terraform Scheduled Management

on:
  schedule:
    # Destroy every day at 22:00 UTC (midnight CE(S)T)
    - cron: '0 22 * * *'
    # Apply every day at 07:00 UTC (9:00 CE(S)T)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event.schedule == '0 22 * * *' && 'destroy' || 'apply') }}
    runs-on: ubuntu-latest

    env:
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Determine Action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "action=destroy" >> $GITHUB_OUTPUT
          else
            echo "action=apply" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Apply
        if: steps.action.outputs.action == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: steps.action.outputs.action == 'destroy'
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ACTION="${{ steps.action.outputs.action }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${EMOJI} *aws-platform-demo* — terraform ${ACTION} ${STATUS}\"}"
