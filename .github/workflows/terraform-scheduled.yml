name: Terraform Scheduled Management

on:
  schedule:
    # Stop EC2 every day at 22:00 UTC
    - cron: '0 22 * * *'
    # Start EC2 every weekday at 07:00 UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - start
          - stop
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event.schedule == '0 22 * * *' && 'destroy' || 'apply') }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for OIDC

    env:
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::658424926455:role/aws-platform-demo-github-actions-role
          aws-region: eu-central-1
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Determine Action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "action=stop" >> $GITHUB_OUTPUT
          else
            echo "action=start" >> $GITHUB_OUTPUT
          fi

      - name: EC2 Stop
        if: steps.action.outputs.action == 'stop'
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances             --filters "Name=tag:Name,Values=aws-platform-demo-k3s"             --query 'Reservations[0].Instances[0].InstanceId'             --output text --region eu-central-1)
          aws ec2 stop-instances --instance-ids $INSTANCE_ID --region eu-central-1
          echo "EC2 $INSTANCE_ID stopped"

      - name: EC2 Start
        if: steps.action.outputs.action == 'start'
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances             --filters "Name=tag:Name,Values=aws-platform-demo-k3s"             --query 'Reservations[0].Instances[0].InstanceId'             --output text --region eu-central-1)
          aws ec2 start-instances --instance-ids $INSTANCE_ID --region eu-central-1
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID --region eu-central-1
          echo "EC2 $INSTANCE_ID started"

      - name: Terraform Apply
        if: steps.action.outputs.action == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: steps.action.outputs.action == 'destroy'
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ACTION="${{ steps.action.outputs.action }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${EMOJI} *aws-platform-demo* — terraform ${ACTION} ${STATUS}\"}"
