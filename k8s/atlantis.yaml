apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlantis
  namespace: atlantis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-config
  namespace: atlantis
data:
  repos.yaml: |
    repos:
      - id: github.com/k-shevtsov/aws-platform-demo
        allowed_overrides: [workflow]
        allow_custom_workflows: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.35.0
          ports:
            - containerPort: 4141
          args:
            - server
          env:
            - name: ATLANTIS_GH_USER
              value: k-shevtsov
            - name: ATLANTIS_GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: atlantis-secrets
                  key: github-token
            - name: ATLANTIS_GH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-secrets
                  key: webhook-secret
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "github.com/k-shevtsov/aws-platform-demo"
            - name: ATLANTIS_PORT
              value: "4141"
            - name: ATLANTIS_ATLANTIS_URL
              value: "http://3.74.21.213:30141"
            - name: ATLANTIS_REPO_CONFIG_FILE
              value: /config/repos.yaml
            - name: AWS_REGION
              value: eu-central-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws-secret-access-key
            - name: TF_VAR_ssh_public_key
              value: "placeholder"
            - name: ATLANTIS_TF_DOWNLOAD
              value: "false"
            - name: ATLANTIS_DEFAULT_TF_VERSION
              value: "v1.11.4"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: atlantis-data
              mountPath: /atlantis
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: atlantis-config
        - name: atlantis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: atlantis
  namespace: atlantis
spec:
  type: NodePort
  selector:
    app: atlantis
  ports:
    - port: 4141
      targetPort: 4141
      nodePort: 30141
